{% extends "base.html" %}
{% block title %}Editar Post{% endblock %}
{% block content %}
<div class="row justify-content-center">
    
    <div class="col-md-8">
        <div class="card">

            <div class="card-header bg-warning">
                <h3 class="mb-0">Editar Post</h3>
            </div>

            <div class="card-body">
                <form method="POST"> 
                    <div class="mb-3"> 

                        <label for="title" class="form-label">Título</label>

                        <input type="text" class="form-control" id="title" name="title" value="{{ post.title }}" required> 

                    </div>
                    <div class="mb-3">

                        <label for="content" class="form-label">Conteúdo</label>
                        <textarea class="form-control" id="content" name="content" rows="8" required>{{post.content}}</textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <a href="{{ url_for('post_detail', post_id=post.id) }}" class="btn btn-secondary"> Cancelar </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
